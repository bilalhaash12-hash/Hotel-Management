<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel Admin - Enquiries</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="shared.css">
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
  <div class="left-info">
    <h2 class="logo">Hotel Admin</h2>
    <a id="managerInfo" href="#">Manager:</a>
    <a id="emailInfo" href="#">Email</a>
    <a id="phoneInfo" href="#">Phone</a>
    <a id="whatsappLink" href="#" target="_blank">WhatsApp</a>
  </div>
  <div class="center-info">
    <div class="mobile-toggle" onclick="toggleMenu()">☰</div>
    <span id="hotelName">Hotel Name</span>
  </div>
  <div class="user-info">
    <span id="greeting">Hi 👋 User</span>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <ul class="menu">
    <li class="menu-item">
      <a href="topbar.html"><span>🏠</span> <span class="text">Dashboard</span></a>
    </li>
    <li class="menu-item">
      <a href="bookings.html"><span>📅</span> <span class="text">Bookings</span></a>
    </li>
    <li class="menu-item">
      <a href="card.html"><span>🛏</span> <span class="text">Rooms</span></a>
    </li>
    <li class="menu-item">
      <a href="guest.html"><span>👥</span> <span class="text">Guests</span></a>
    </li>
    <li class="menu-item">
      <a href="payment.html"><span>💳</span> <span class="text">Payments</span></a>
    </li>
    <li class="menu-item">
      <a href="#"><span>⭐</span> <span class="text">Reviews</span></a>
    </li>
    <li class="menu-item">
      <a href="enquiry.html"><span>📧</span> <span class="text">Enquiries</span></a>
    </li>
    <li class="menu-item">
      <a href="#"><span>⚙</span> <span class="text">Settings</span></a>
    </li>
  </ul>
  <div class="logout-container">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="main-content">
  <div class="header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1>Customer Enquiries</h1>
    <input type="text" id="searchEnquiry" placeholder="Search by name or email..." oninput="filterEnquiries()" style="padding: 10px 15px; border: 1px solid #ddd; border-radius: 10px; width: 300px;">
  </div>

  <div class="enquiry-list" id="enquiryList" style="display: grid; grid-template-columns: 1fr; gap: 15px;">
    <!-- Enquiries will be loaded here -->
  </div>
</div>

<style>
/* Page specific styles for enquiry cards */
.enquiry-card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  display: grid;
  grid-template-columns: 2fr 3fr 1fr;
  gap: 20px;
  align-items: center;
  border-left: 5px solid #020830;
  transition: 0.3s;
}
.enquiry-card.unread { background: #f0f4ff; border-left-color: #3b82f6; }
.enquiry-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
.customer-info h4 { margin: 0 0 5px 0; color: #020830; }
.customer-info p { margin: 2px 0; font-size: 13px; color: #666; }
.enquiry-message blockquote { margin: 0; font-style: italic; color: #333; font-size: 14px; }
.enquiry-message .subject { font-weight: bold; display: block; margin-bottom: 5px; }
.enquiry-actions { display: flex; flex-direction: column; gap: 10px; }
.status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: center; }
.status-pending { background: #fee2e2; color: #dc2626; }
.status-read { background: #fef3c7; color: #d97706; }
.status-resolved { background: #dcfce7; color: #16a34a; }
.action-btn { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }
.btn-read { background: #e5e7eb; color: #374151; }
.btn-delete { background: #ef4444; color: white; }
.btn-resolve { background: #10b981; color: white; }
.action-btn:hover { opacity: 0.9; transform: scale(1.05); }

@media (max-width: 768px) {
  .enquiry-card { grid-template-columns: 1fr; gap: 15px; }
  .enquiry-actions { flex-direction: row; justify-content: flex-start; gap: 10px; }
}
</style>

<script src="admin-scripts.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  loadEnquiries();
});

async function loadEnquiries() {
  try {
    const response = await fetch('/api/enquiries');
    const enquiries = await response.json();
    const list = document.getElementById("enquiryList");
    list.innerHTML = "";

    if (enquiries.length === 0) {
      list.innerHTML = `<div class="enquiry-card" style="grid-template-columns: 1fr; text-align: center;"><h3>No enquiries found.</h3></div>`;
      return;
    }

    enquiries.sort((a, b) => {
      if (a.status === "pending" && b.status !== "pending") return -1;
      if (a.status !== "pending" && b.status === "pending") return 1;
      return new Date(b.createdAt) - new Date(a.createdAt);
    });

    enquiries.forEach(enq => {
      const isUnread = enq.status === "pending";
      const card = document.createElement("div");
      card.className = `enquiry-card ${isUnread ? 'unread' : ''}`;
      card.id = `enq-${enq._id}`;
      
      const dateStr = new Date(enq.createdAt).toLocaleString();

      card.innerHTML = `
        <div class="customer-info">
          <h4>${enq.name}</h4>
          <p>📧 ${enq.email}</p>
          <p>📞 ${enq.phone}</p>
          <p>📅 ${dateStr}</p>
        </div>
        <div class="enquiry-message">
          <span class="subject">${enq.subject || "No Subject"}</span>
          <blockquote>"${enq.message}"</blockquote>
        </div>
        <div class="enquiry-actions">
          <span class="status-badge status-${enq.status}">${enq.status}</span>
          ${enq.status === 'pending' ? `<button class="action-btn btn-read" onclick="updateStatus('${enq._id}', 'read')">Mark Read</button>` : ''}
          ${enq.status === 'read' ? `<button class="action-btn btn-resolve" onclick="updateStatus('${enq._id}', 'resolved')">Resolve</button>` : ''}
          <button class="action-btn btn-delete" onclick="deleteEnquiry('${enq._id}')">Delete</button>
        </div>
      `;
      list.appendChild(card);
    });
  } catch (error) {
    console.error("Error loading enquiries:", error);
  }
}

async function updateStatus(id, newStatus) {
  try {
    await fetch(`/api/enquiries/${id}/status`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    loadEnquiries();
  } catch (error) {
    console.error("Error updating status:", error);
  }
}

async function deleteEnquiry(id) {
  if (confirm("Are you sure you want to delete this enquiry?")) {
    try {
      await fetch(`/api/enquiries/${id}`, { method: 'DELETE' });
      loadEnquiries();
    } catch (error) {
      console.error("Error deleting enquiry:", error);
    }
  }
}

function filterEnquiries() {
  const query = document.getElementById("searchEnquiry").value.toLowerCase();
  const cards = document.querySelectorAll(".enquiry-card");
  
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(query) ? "grid" : "none";
  });
}
</script>

</body>
</html>
