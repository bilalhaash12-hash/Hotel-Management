<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel Admin - Rooms</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="shared.css">
<style>
/* Page specific styles for Room cards */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  padding: 20px;
}
.card {
  border-radius: 20px;
  background: #020833;
  color: white;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
}
.add-card {
  border-radius: 20px;
  background: #020833;
  color: white;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  cursor: pointer;
  min-height: 250px;
  transition: 0.3s;
}
.add-card:hover { background: #0a0f4d; transform: scale(1.03); }
.images { display: flex; overflow-x: auto; }
.images img { width: 100%; height: 160px; object-fit: cover; }
.card-body { padding: 15px; }
.btn { background: orange; border: none; padding: 8px; cursor: pointer; border-radius: 6px; margin-top: 5px; font-weight: bold; }
.form-box { display: none; background: white; color: black; padding: 15px; border-radius: 10px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.form-box input, .form-box select, .form-box textarea { width: 100%; box-sizing: border-box; margin: 8px 0; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; font-size: 14px; }
.form-box textarea { resize: vertical; min-height: 80px; }
.back-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
.back-btn { background: #1a1f5a; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 500; }
.back-btn:hover { background: #0d133d; }
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">
  <div class="left-info">
    <h2 class="logo">Hotel Admin</h2>
    <a id="managerInfo" href="#">Manager:</a>
    <a id="emailInfo" href="#">Email</a>
    <a id="phoneInfo" href="#">Phone</a>
    <a id="whatsappLink" href="#" target="_blank">WhatsApp</a>
  </div>
  <div class="center-info">
    <div class="mobile-toggle" onclick="toggleMenu()">☰</div>
    <span id="hotelName">Hotel Name</span>
  </div>
  <div class="user-info">
    <span id="greeting">Hi 👋 User</span>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <ul class="menu">
    <li class="menu-item">
      <a href="topbar.html"><span>🏠</span> <span class="text">Dashboard</span></a>
    </li>
    <li class="menu-item">
      <a href="bookings.html"><span>📅</span> <span class="text">Bookings</span></a>
    </li>
    <li class="menu-item">
      <a href="card.html"><span>🛏</span> <span class="text">Rooms</span></a>
    </li>
    <li class="menu-item">
      <a href="guest.html"><span>👥</span> <span class="text">Guests</span></a>
    </li>
    <li class="menu-item">
      <a href="payment.html"><span>💳</span> <span class="text">Payments</span></a>
    </li>
    <li class="menu-item">
      <a href="#"><span>⭐</span> <span class="text">Reviews</span></a>
    </li>
    <li class="menu-item">
      <a href="enquiry.html"><span>📧</span> <span class="text">Enquiries</span></a>
    </li>
    <li class="menu-item">
      <a href="#"><span>⚙</span> <span class="text">Settings</span></a>
    </li>
  </ul>
  <div class="logout-container">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="main-content">
  <h1>Manage Rooms</h1>
  <p>Add or edit room types and pricing.</p>
  <div class="container" id="container"></div>
</div>


<script src="admin-scripts.js"></script>
<script>
let rooms = [];
const container = document.getElementById("container");

async function fetchRooms() {
  try {
    const response = await fetch('http://https://hotel-management-xnc5.onrender.com/api/rooms');
    rooms = await response.json();
    displayRooms();
  } catch (error) {
    console.error("Error fetching rooms:", error);
  }
}

function displayRooms() {
  container.innerHTML = `<div class="add-card" onclick="addCard()">+</div>`;
  rooms.forEach((room, i) => {
    let imagesHTML = room.images && room.images.length > 0 ? room.images.map(img => `<img src="${img}">`).join("") : '';
    container.innerHTML += `
      <div class="card">
        <div class="images">${imagesHTML}</div>
        <div class="card-body">
          <h3>${room.type || 'New Room'}</h3>
          <p style="color: #bbb; font-size: 14px;">📍 ${room.location || 'Location not set'}</p>
          <p>₹${room.price || '0'}</p>
          <p>${room.checkin || ''} - ${room.checkout || ''}</p>
          <p>${room.features || ''}</p>
          <button class="btn" onclick="toggleForm(${i})">Edit</button>
          <button class="btn" onclick="deleteCard('${room._id}')" style="background: red; color: white; margin-left: 5px;">Delete</button>
        </div>
        <div class="form-box" id="form-${i}">
          <select id="type-${i}">
            <option ${room.type==='Deluxe'?'selected':''}>Deluxe</option>
            <option ${room.type==='Suite'?'selected':''}>Suite</option>
            <option ${room.type==='Standard'?'selected':''}>Standard</option>
            <option ${room.type==='Family'?'selected':''}>Family</option>
          </select>
          <input type="text" id="location-${i}" placeholder="Location/Place" value="${room.location || ''}">
          <input type="number" id="price-${i}" placeholder="Price" value="${room.price || ''}">
          <div style="display: flex; gap: 10px;">
            <input type="time" id="checkin-${i}" value="${room.checkin ? room.checkin.split(' ')[0] : ''}">
            <select id="checkinPeriod-${i}" style="width: 100px;">
              <option ${room.checkin && room.checkin.includes('AM')?'selected':''}>AM</option>
              <option ${room.checkin && room.checkin.includes('PM')?'selected':''}>PM</option>
            </select>
          </div>
          <div style="display: flex; gap: 10px;">
            <input type="time" id="checkout-${i}" value="${room.checkout ? room.checkout.split(' ')[0] : ''}">
            <select id="checkoutPeriod-${i}" style="width: 100px;">
              <option ${room.checkout && room.checkout.includes('AM')?'selected':''}>AM</option>
              <option ${room.checkout && room.checkout.includes('PM')?'selected':''}>PM</option>
            </select>
          </div>
          <textarea id="features-${i}" placeholder="Features">${room.features || ''}</textarea>
          <input type="file" id="images-${i}" multiple>
          <button class="btn" onclick="updateCard(${i}, '${room._id}')">Update</button>
        </div>
      </div>
    `;
  });
}

async function addCard() {
  const userData = JSON.parse(localStorage.getItem("user")) || {};
  const newRoom = {
    type: "New Room",
    hotelName: userData.hotel || "Premium Stay Hotel",
    price: 0
  };

  try {
    await fetch('http://https://hotel-management-xnc5.onrender.com/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newRoom)
    });
    fetchRooms();
  } catch (error) {
    console.error("Error creating room:", error);
  }
}

async function deleteCard(id) {
  if (confirm("Delete this room?")) {
    try {
      await fetch(`http://https://hotel-management-xnc5.onrender.com/api/rooms/${id}`, { method: 'DELETE' });
      fetchRooms();
    } catch (error) {
      console.error("Error deleting room:", error);
    }
  }
}

function toggleForm(i) {
  let form = document.getElementById("form-" + i);
  form.style.display = (form.style.display === "block") ? "none" : "block";
}

async function updateCard(i, id) {
  let files = document.getElementById("images-" + i).files;
  let checkin = document.getElementById("checkin-" + i).value;
  let checkinPeriod = document.getElementById("checkinPeriod-" + i).value;
  let checkout = document.getElementById("checkout-" + i).value;
  let checkoutPeriod = document.getElementById("checkoutPeriod-" + i).value;

  let readers = [];
  for (let f = 0; f < files.length; f++) {
    let reader = new FileReader();
    readers.push(new Promise(resolve => {
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(files[f]);
    }));
  }

  Promise.all(readers).then(async (images) => {
    const userData = JSON.parse(localStorage.getItem("user")) || {};
    
    const updatedData = {
      type: document.getElementById("type-" + i).value,
      location: document.getElementById("location-" + i).value,
      price: document.getElementById("price-" + i).value,
      checkin: checkin ? checkin + " " + checkinPeriod : "",
      checkout: checkout ? checkout + " " + checkoutPeriod : "",
      features: document.getElementById("features-" + i).value,
      hotelName: userData.hotel || "Premium Stay Hotel"
    };
    
    if (images.length > 0) updatedData.images = images;

    try {
      await fetch(`http://https://hotel-management-xnc5.onrender.com/api/rooms/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updatedData)
      });
      fetchRooms();
    } catch (error) {
      console.error("Error updating room:", error);
    }
  });
}

// Initial fetch
fetchRooms();
</script>

</body>
</html>
