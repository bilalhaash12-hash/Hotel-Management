<!DOCTYPE html>
<html>
<head>
  <title>Login Choice</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: white;
      color: black;
    }

    .box {
      text-align: center;
      padding: 30px;
      background: #f1f1f3;
      border-radius: 12px;
      backdrop-filter: blur(5px);
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
      
    }
    button:hover{
      transform: translateY(-5px);
      background-color: #424eac;
    }
    .user {
      background:#020833;
      color: white;
    }

    .owner {
      background: #020833;
      color: white;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login As</h2>
  <button class="user" onclick="location.href='userform.html'">User</button>
  <button class="owner" onclick="location.href='hotelreg.html'">Hotel Owner</button>
</div>

</body>
</html>
