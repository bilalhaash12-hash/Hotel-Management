
<!DOCTYPE html>
<html>
<head>
  <title>Login with Confirm Password</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: rgb(2, 5, 47);
    }

    .form-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 90%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #022327;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e9ecec;
      color: black;
      transform: translateY(-5px);
    }

    @media (max-width: 600px) {
      .form-box {
        width: 90%;
        padding: 20px;
      }

      input, button {
        width: 100%;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

<div class="form-box">
  <h2>LOGIN</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <input type="password" id="confirm" placeholder="Confirm Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let confirm = document.getElementById("confirm").value;

  if (email === "" || password === "" || confirm === "") {
    alert("Please fill all fields");
  }
  else if (password !== confirm) {
    alert("❌ Passwords do not match");
  }
  else {
    // success → redirect
    window.location.href = "index.html";
  }
}
</script>

</body>
