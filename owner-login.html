<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Login</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  padding: 15px;

  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #1a1f5a, #020833);
  font-family: Arial, sans-serif;
}

/* FORM */
#loginForm {
  background: white;
  padding: 25px;
  border-radius: 12px;

  width: 100%;
  max-width: 380px;

  display: flex;
  flex-direction: column;
  gap: 12px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

#loginForm h2 {
  text-align: center;
}

/* INPUTS */
#loginForm input {
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 16px;
  transition: 0.3s;
}

#loginForm input:focus {
  border-color: #1a1f5a;
  outline: none;
}

#loginForm input:hover {
  transform: translateY(-2px);
}

/* BUTTON */
.btn-primary {
  padding: 12px;
  background: #1a1f5a;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.btn-primary:hover {
  background: #020833;
  transform: translateY(-2px);
}

/* TEXT */
#loginForm p {
  font-size: 14px;
  text-align: center;
}

#loginForm a {
  color: #1a1f5a;
  text-decoration: none;
  font-weight: bold;
}

/* 📱 MOBILE FIX */
@media (max-width: 480px) {

  body {
    padding: 10px;
    align-items: flex-start;
  }

  #loginForm {
    padding: 20px;
  }

  #loginForm h2 {
    font-size: 18px;
  }

  #loginForm input {
    font-size: 14px;
    padding: 10px;
  }

  .btn-primary {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<form id="loginForm">
  <h2>HOTEL LOGIN</h2>

  <input type="email" id="loginEmail" placeholder="Email" required>
  <input type="password" id="loginPassword" placeholder="Password" required>

  <button type="submit" class="btn-primary">Login</button>

  <p>Don't have an account? <a href="owner-reg.html">Register here</a></p>
</form>

<script>
const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  // ✅ Get user from register page
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    alert("❌ No user found. Please register first.");
    return;
  }

  if (email === user.email && password === user.password) {

    localStorage.setItem("isLoggedIn", "true");

    alert("✅ Login successful!");
    window.location.href = "adminpage.html";

  } else {
    alert("❌ Invalid email or password");
  }
});
</script>

</body>
</html>
